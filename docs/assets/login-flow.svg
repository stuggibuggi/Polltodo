<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <style>
      .t { font-family: Segoe UI, Arial, sans-serif; fill: #111827; }
      .h { font-size: 22px; font-weight: 700; }
      .b { font-size: 15px; font-weight: 600; }
      .s { font-size: 13px; }
    </style>
  </defs>
  <rect width="1200" height="320" fill="#f8fafc"/>
  <text x="40" y="42" class="t h">Login-Ablauf</text>
  <rect x="40" y="90" width="220" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="58" y="120" class="t b">1. Login-Seite</text>
  <text x="58" y="145" class="t s">Benutzerkennung + Passwort</text>
  <rect x="330" y="90" width="220" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="348" y="120" class="t b">2. Authentifizierung</text>
  <text x="348" y="145" class="t s">Lokal und/oder LDAP</text>
  <rect x="620" y="90" width="220" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="638" y="120" class="t b">3. Rollenpruefung</text>
  <text x="638" y="145" class="t s">VIEWER / EDITOR / ADMIN</text>
  <rect x="910" y="90" width="240" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="928" y="120" class="t b">4. Weiterleitung</text>
  <text x="928" y="145" class="t s">Default-Seite oder Zielseite</text>
  <line x1="260" y1="150" x2="330" y2="150" stroke="#334155" stroke-width="2"/>
  <polygon points="330,150 318,144 318,156" fill="#334155"/>
  <line x1="550" y1="150" x2="620" y2="150" stroke="#334155" stroke-width="2"/>
  <polygon points="620,150 608,144 608,156" fill="#334155"/>
  <line x1="840" y1="150" x2="910" y2="150" stroke="#334155" stroke-width="2"/>
  <polygon points="910,150 898,144 898,156" fill="#334155"/>
</svg>
