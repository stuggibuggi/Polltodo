<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <style>
      .t { font-family: Segoe UI, Arial, sans-serif; fill: #111827; }
      .h { font-size: 24px; font-weight: 700; }
      .b { font-size: 15px; font-weight: 600; }
      .s { font-size: 13px; }
    </style>
  </defs>
  <rect width="1400" height="420" fill="#f8fafc"/>
  <text x="34" y="42" class="t h">Prisma Lifecycle (Dev und Prod)</text>

  <rect x="40" y="90" width="260" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="58" y="120" class="t b">1. Schema aendern</text>
  <text x="58" y="145" class="t s">prisma/schema.prisma</text>
  <text x="58" y="168" class="t s">Modelle/Enums/Relationen</text>

  <rect x="340" y="90" width="320" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="358" y="120" class="t b">2a. Entwicklung</text>
  <text x="358" y="145" class="t s">npm run prisma:migrate</text>
  <text x="358" y="168" class="t s">Migration erzeugen + anwenden</text>

  <rect x="700" y="90" width="320" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="718" y="120" class="t b">2b. Produktion</text>
  <text x="718" y="145" class="t s">npm run prisma:migrate:deploy</text>
  <text x="718" y="168" class="t s">Nur vorhandene Migrationen ausrollen</text>

  <rect x="1060" y="90" width="300" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="1078" y="120" class="t b">3. Client erzeugen</text>
  <text x="1078" y="145" class="t s">npm run prisma:generate</text>
  <text x="1078" y="168" class="t s">@prisma/client aktualisieren</text>

  <line x1="300" y1="155" x2="340" y2="155" stroke="#334155" stroke-width="2"/>
  <polygon points="340,155 328,149 328,161" fill="#334155"/>
  <line x1="660" y1="155" x2="700" y2="155" stroke="#334155" stroke-width="2"/>
  <polygon points="700,155 688,149 688,161" fill="#334155"/>
  <line x1="1020" y1="155" x2="1060" y2="155" stroke="#334155" stroke-width="2"/>
  <polygon points="1060,155 1048,149 1048,161" fill="#334155"/>

  <rect x="40" y="270" width="1320" height="110" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="58" y="302" class="t b">Seed und Hilfsskripte</text>
  <text x="58" y="326" class="t s">npm run seed | npm run create-admin | npm run cron:tasks | maintenance scripts fuer Override-Cleanup.</text>
</svg>
