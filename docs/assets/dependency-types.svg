<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <defs>
    <style>
      .t { font-family: Segoe UI, Arial, sans-serif; fill: #111827; }
      .h { font-size: 22px; font-weight: 700; }
      .b { font-size: 14px; font-weight: 600; }
      .s { font-size: 13px; }
    </style>
  </defs>
  <rect width="1200" height="440" fill="#f8fafc"/>
  <text x="40" y="42" class="t h">Bedingungstypen fuer Abhaengigkeiten</text>

  <rect x="40" y="80" width="250" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="58" y="110" class="t b">Text/Werte</text>
  <text x="58" y="135" class="t s">eq, contains, starts_with</text>
  <text x="58" y="158" class="t s">ends_with, not_contains</text>

  <rect x="320" y="80" width="250" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="338" y="110" class="t b">Numerisch</text>
  <text x="338" y="135" class="t s">gt, gte, lt, lte</text>

  <rect x="600" y="80" width="250" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="618" y="110" class="t b">Datum</text>
  <text x="618" y="135" class="t s">date_is_future / date_is_past</text>
  <text x="618" y="158" class="t s">date_equals / within_future_days</text>

  <rect x="880" y="80" width="280" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="898" y="110" class="t b">Objektkontext</text>
  <text x="898" y="135" class="t s">object_type_eq</text>
  <text x="898" y="158" class="t s">object_meta_eq (Key/Value Dropdown)</text>

  <rect x="220" y="250" width="340" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="240" y="280" class="t b">Logik</text>
  <text x="240" y="305" class="t s">ALL = UND (alle Bedingungen)</text>
  <text x="240" y="328" class="t s">ANY = ODER (mindestens eine)</text>

  <rect x="620" y="250" width="360" height="130" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="640" y="280" class="t b">Ranking</text>
  <text x="640" y="305" class="t s">ranking_contains</text>
  <text x="640" y="328" class="t s">ranking_position_eq / better_than</text>
</svg>
